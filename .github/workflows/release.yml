name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_NDK_VERSION: '25.1.8937393'
  APK_BASENAME: keenon-uvc-multi-probe

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Create local.properties
        run: |
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "ndk.dir=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          } > local.properties

      - name: Resolve app version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "APP_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "APP_VERSION_NAME=0.0.${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          fi
          echo "APP_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew clean :app:assembleDebug --stacktrace

      - name: Prepare APK artifact
        id: artifact
        run: |
          mkdir -p release
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_SUFFIX="${GITHUB_REF_NAME}"
          else
            VERSION_SUFFIX="manual-${GITHUB_RUN_NUMBER}"
          fi
          APK_FILE="release/${APK_BASENAME}-${VERSION_SUFFIX}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_FILE}"
          echo "apk_file=${APK_FILE}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=$(basename "${APK_FILE}")" >> "${GITHUB_OUTPUT}"

      - name: Write release notes
        run: |
          cat > release/RELEASE_NOTES.md <<EOF
          ## 更新内容
          - 默认使用 Android Camera2/HAL 官方兼容路径打开摄像头，贴近 Keenon 官方 CurrencyCameraActivity 调用方式
          - 保留 HTTP MJPEG 拉流服务，继续提供 /cameras、/stream/{slot}.mjpeg 和 /snapshot/{slot}.jpg 作为回退验证入口
          - 默认启用主动 WebSocket 推流，将 4 路 JPEG 通过一个长连接推送到 ws://192.168.112.194:9090/
          - WebSocket 二进制消息使用 KJPG 头携带 slotIndex、timestamp、sequence、width、height 和 jpegLength，接收端按 slotIndex 区分 4 路
          - 默认每路 500ms 推送一帧 JPEG，可通过 ADB extra 覆盖推流开关、目标地址、路数和间隔

          ## 验证
          - GitHub Actions 自动构建 Android debug APK
          - APK 包含 armeabi-v7a 与 arm64-v8a native 库
          - 现场日志可通过 WebSocket主动推流已启用、WebSocket推流已连接 和 WebSocket推流状态 确认推流链路

          ## 安装
          \`\`\`bash
          adb install -r ${{ steps.artifact.outputs.apk_name }}
          \`\`\`
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_BASENAME }}
          path: release/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Keenon UVC Multi Probe ${{ github.ref_name }}
          body_path: release/RELEASE_NOTES.md
          files: release/*.apk
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
